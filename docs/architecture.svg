<svg xmlns="http://www.w3.org/2000/svg" width="980" height="280" viewBox="0 0 980 280" role="img" aria-labelledby="title desc">
  <title id="title">AsyncOPD process topology</title>
  <desc id="desc">Rollout generates responses, teacher workers produce logprobs or artifacts, trainers update the student, and NCCL synchronizes weights back to rollout.</desc>
  <style>
    .panel { fill: #ffffff; stroke: #d0d7de; stroke-width: 1.5; }
    .box { fill: #f6f8fa; stroke: #57606a; stroke-width: 1.5; }
    .title { fill: #24292f; font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .sub { fill: #57606a; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #57606a; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label-bg { fill: #ffffff; }
    .flow { fill: none; stroke: #57606a; stroke-width: 1.8; stroke-linecap: round; }
    .flow-head { fill: #57606a; }
    .sync { fill: none; stroke: #0969da; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 5; }
    .sync-head { fill: #0969da; }
    .sync-label { fill: #0969da; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  </style>

  <rect class="panel" x="1" y="1" width="978" height="278" rx="12" />

  <g transform="translate(60 58)">
    <rect class="box" width="190" height="92" rx="10" />
    <text class="title" x="95" y="38" text-anchor="middle">Rollout</text>
    <text class="sub" x="95" y="63" text-anchor="middle">student vLLM</text>
  </g>

  <g transform="translate(395 58)">
    <rect class="box" width="190" height="92" rx="10" />
    <text class="title" x="95" y="38" text-anchor="middle">Teacher</text>
    <text class="sub" x="95" y="63" text-anchor="middle">vLLM or HF</text>
  </g>

  <g transform="translate(730 58)">
    <rect class="box" width="190" height="92" rx="10" />
    <text class="title" x="95" y="38" text-anchor="middle">Trainer</text>
    <text class="sub" x="95" y="63" text-anchor="middle">FSDP or Megatron</text>
  </g>

  <!-- Generated-response flow: the arrow tip lands on the teacher box edge. -->
  <path class="flow" d="M 250 104 H 381" />
  <polygon class="flow-head" points="395,104 381,96 381,112" />
  <rect class="label-bg" x="256" y="78" width="133" height="17" rx="4" />
  <text class="label" x="322.5" y="91" text-anchor="middle">generated responses</text>

  <!-- Teacher artifact flow: the arrow tip lands on the trainer box edge. -->
  <path class="flow" d="M 585 104 H 716" />
  <polygon class="flow-head" points="730,104 716,96 716,112" />
  <rect class="label-bg" x="592" y="78" width="131" height="17" rx="4" />
  <text class="label" x="657.5" y="91" text-anchor="middle">logprobs / artifacts</text>

  <!-- Weight synchronization returns to rollout; the arrow tip meets the rollout box bottom edge. -->
  <path class="sync" d="M 825 150 V 218 H 155 V 164" />
  <polygon class="sync-head" points="155,150 147,164 163,164" />
  <rect class="label-bg" x="336" y="235" width="308" height="18" rx="4" />
  <text class="sync-label" x="490" y="249" text-anchor="middle">NCCL GPU-direct weight sync: updated weights</text>
</svg>

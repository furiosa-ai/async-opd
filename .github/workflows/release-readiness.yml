name: Public sanity

on:
  pull_request:
    paths:
      - ".github/**"
      - "Makefile"
      - "docs/**"
      - "pyproject.toml"
      - "pytest.ini"
      - "tests/test_cli_entrypoints.py"
      - "tests/test_public_api.py"
      - "tests/test_cpu_stub_pipeline.py"
      - "configs/**/*.yml"
      - "configs/**/*.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-sanity-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-sanity:
    name: Public sanity checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pytest pytest-xdist pyyaml

      - name: Run public no-GPU tests
        run: |
          python -m pytest \
            tests/test_cli_entrypoints.py \
            tests/test_public_api.py \
            tests/test_cpu_stub_pipeline.py \
            -q -o addopts=""

      - name: Build package artifacts
        run: |
          python -m build --sdist --wheel

      - name: Basic static scans
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in [*Path(".github/workflows").glob("*.yml"), *Path(".github/workflows").glob("*.yaml"), *Path(".github/ISSUE_TEMPLATE").glob("*.yml"), *Path(".github/ISSUE_TEMPLATE").glob("*.yaml")]:
              with path.open() as fh:
                  yaml.safe_load(fh)
              print(f"YAML OK: {path}")
          PY
          ! grep -RInE '^(<<<<<<<|=======|>>>>>>>)' .github docs pyproject.toml pytest.ini

      - name: Upload package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-sanity-dist
          if-no-files-found: ignore
          path: |
            dist/*

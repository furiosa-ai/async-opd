name: Bug report
description: Report a reproducible AsyncOPD bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include private model weights, datasets, logs with secrets, or internal infrastructure details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Minimal commands/config changes needed to reproduce the issue.
      placeholder: |
        1. Install with ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python, CUDA, GPU type/count, PyTorch, vLLM, OS, and install method.
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact tokens, usernames, hostnames, private paths, and dataset/model secrets.
      render: text

# Example: GRPO RL Training — Qwen3-1.7B with correctness reward
# Hardware: 8 GPUs (1 reference, 3 rollout, 4 trainer)
# Dataset: DeepScaleR math (40K problems)
# Eval: AIME 2024 Avg@32
# Reference policy: same model as student (frozen), used for KL penalty
model:
  path: Qwen/Qwen3-1.7B
teacher:
  path: Qwen/Qwen3-1.7B
  gpu_ids: '0'
  vllm:
    tensor_parallel_size: 1
    n_logprobs: 1
    max_model_len: 18688
data:
  train_files: hf:agentica-org/DeepScaleR-Preview-Dataset
  val_files: hf:Maxwell-Jia/AIME_2024
  prompt_template: '{problem}

    Please reason step by step, and put your final answer within \boxed{}.'
  answer_key: answer
  enable_thinking: false
  prompt_key: problem
  max_prompt_length: 2048
  max_response_length: 16384
rollout:
  gpu_ids: 1,2,3
  n_gpus: 3
  temperature: 1.0
  vllm:
    max_model_len: 18432
    max_num_seqs: 512
trainer:
  gpu_ids: 4,5,6,7
  n_gpus: 4
  batch_size: 32
  micro_batch_size: 8
  use_torch_compile: true
  total_steps: 200
  total_epochs: 10
  optim:
    lr: 1e-6
    lr_decay_style: cosine
    weight_decay: 0.01
algorithm:
  mode: grpo
  grpo:
    group_size: 8
    clip_eps: 0.2
    kl_beta: 0.01
    reward_fn: correctness
pipeline:
  n_step_off:
    step_off: 1
eval:
  freq: 40
  mode:
  - post_allgpu
  before_train: true
  n_samples: 32
  temperature: 1.0
weight_sync:
  backend: nccl

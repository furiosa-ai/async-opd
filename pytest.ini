[pytest]
markers =
    gpu: tests requiring GPU
    gpu_isolated: GPU tests needing process isolation (run separately with: pytest -m gpu_isolated)
    slow: tests requiring model downloads or network access (not skipped by default; use -m "not slow" for offline runs)
# GPU-isolated tests fail in the full suite due to CUDA/NCCL state leaks
# between tests. Run them separately: pytest -m gpu_isolated tests/
addopts = -m "not gpu_isolated" -n auto
